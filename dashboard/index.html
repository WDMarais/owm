<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>owm</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── Top navbar ────────────────────────────────────────────────────── -->
  <header id="top-nav">
    <span class="wordmark">owm</span>
    <div id="instance-dock" class="hidden">
      <span id="dock-name" class="dock-name"></span>
      <span id="dock-status" class="status-badge"></span>
      <a id="dock-url" class="dock-url" target="_blank" rel="noopener"></a>
      <span id="dock-meta" class="dock-meta"></span>
      <div class="actions-wrap">
        <button class="btn btn-actions" id="actions-btn">Actions ▾</button>
        <div class="actions-menu hidden" id="actions-menu">
          <button class="action-item btn-stop">Stop</button>
          <button class="action-item btn-kill">Kill</button>
          <button class="action-item btn-archive">Archive</button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Three-pane workspace ──────────────────────────────────────────── -->
  <div id="workspace">

    <!-- ── Left nav pane ──────────────────────────────────────────────── -->
    <nav id="left-pane">

      <div class="nav-section nav-section-instances">
        <div class="section-label">Instances</div>
      </div>

      <div class="nav-section nav-section-remotes">
        <div class="section-label">Remotes</div>
      </div>

      <div class="nav-section nav-section-notifications" id="notifications-section">
        <div class="section-label">Notifications</div>
      </div>

      <div class="nav-section nav-section-footer">
        <a href="#processes" class="nav-item" data-page="processes">Processes</a>
      </div>
    </nav>

    <!-- ── Centre pane ────────────────────────────────────────────────── -->
    <main id="centre-pane">

      <!-- Commands (most-used, sits at top) -->
      <div class="card">
        <div class="card-title">Commands</div>
        <div class="cmd-list"></div>
      </div>

      <!-- Health -->
      <div class="card">
        <div class="card-title">Health</div>
        <div class="health-grid"></div>
      </div>

      <!-- Scripts -->
      <div class="card">
        <div class="card-title">Scripts</div>
        <div class="script-list"></div>
      </div>

      <!-- Repos -->
      <div class="card">
        <div class="card-title">Repos</div>
        <div class="repo-list"></div>
      </div>

    </main>

    <!-- ── Processes page (replaces centre when active) ───────────────── -->
    <div id="processes-page" class="page hidden">
      <div class="page-header">
        <h2>Processes</h2>
      </div>
    </div>

    <!-- ── Right log pane ─────────────────────────────────────────────── -->
    <aside id="right-pane">
      <div class="tab-strip"></div>
      <div class="log-viewport"></div>
    </aside>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
